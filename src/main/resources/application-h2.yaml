spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:team4
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
jwt:
    secret: local_jwt_secret_key_must_be_at_least_32_characters_long_for_hs256_algorithm